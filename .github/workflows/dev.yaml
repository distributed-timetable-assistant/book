name: Dev Pipeline
on: push

env:
  GITOPS_PROJECT_NAME: gitops
  PROJECT_NAME: book
  DOCKER_NAME: mizotakhteh.book

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup update nightly && rustup default nightly
      - run: cargo build --verbose
      - run: cargo test --verbose

  release-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y musl-tools
      - run: rustup update nightly && rustup default nightly
      - run: rustup target add x86_64-unknown-linux-musl
      - run: cargo build --release --target x86_64-unknown-linux-musl
      - name: Upload binary result
        uses: actions/upload-artifact@v4
        with:
          name: binary_result
          path: target/x86_64-unknown-linux-musl/release/${{ env.PROJECT_NAME }}
          retention-days: 1

  package:
    runs-on: ubuntu-latest
    needs:
      - release-build
    outputs:
      docker-image: ${{ steps.meta.outputs.tags }}
      docker-image-tag: ${{ steps.meta.outputs.version }}
      docker-image-name: "${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_NAME }}"
    steps:
      - run: echo ${{ steps.meta.outputs.tags }}
      - run: echo ${{ steps.meta.outputs.version }}
      - run: echo "${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_NAME }}"
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            Dockerfile
      - name: Download binary result
        uses: actions/download-artifact@v4
        with:
          name: binary_result
          path: target/x86_64-unknown-linux-musl/release/
      - run: chmod +x target/x86_64-unknown-linux-musl/release/${{ env.PROJECT_NAME }}
      - name: Login to the container registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: "${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_NAME }}"
          tags: |
            type=sha,prefix=dev-,suffix=,format=short
      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - run: echo ${{ steps.meta.outputs.tags }}
      - run: echo ${{ steps.meta.outputs.version }}
      - run: echo "${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_NAME }}"

  deploy:
    runs-on: ubuntu-latest
    needs:
      - test
      - package
    steps:
      - uses: actions/checkout@v4
        with:
          repository: "${{ github.repository_owner }}/${{ env.GITOPS_PROJECT_NAME }}"
          token: ${{ secrets.GIT_TOKEN }}
      - run: echo ${{ needs.package.outputs.docker-image }}
      - run: echo ${{ needs.package.outputs.docker-image-name }}
      - run: echo ${{ needs.package.outputs.docker-image-tag }}
      - run: |
          sed -i "/^ *- name: ${{ needs.package.outputs.docker-image-name }} *$/,/^ *newTag: .*/ s/\(newTag: \).*/\1${{ needs.package.outputs.docker-image-tag }}/g" \
            ${{ env.PROJECT_NAME }}/overlays/dev/kustomization.yaml
      - name: Git config
        run: |
          git config --global user.name "Hasan Karimi"
          git config --global user.email "hasankarimi.dev@gmail.com"
      - name: Git commit
        run: |
          git commit -am "ci(${{ env.PROJECT_NAME }}): update image with tag=(${{ needs.package.outputs.docker-image-tag }})" || true
      - run: git push origin
